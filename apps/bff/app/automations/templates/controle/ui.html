<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Painel de Controle — Auditoria</title>
<style>
  :root { --fg:#0f172a; --muted:#475569; --bg:#f8fafc; --card:#ffffff; --pri:#2563eb; }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body { font-family: system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,'Helvetica Neue',Arial,'Noto Sans','Apple Color Emoji','Noto Color Emoji',sans-serif; background:var(--bg); color:var(--fg); }
  .wrap { max-width: 960px; margin: 24px auto; padding: 0 16px; }
  h1 { font-size: 20px; margin: 0 0 12px; }
  .header { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:6px; }
  .card { background:var(--card); border:1px solid #e2e8f0; border-radius: 14px; box-shadow: 0 1px 2px rgba(0,0,0,.04); padding: 16px; }

  /* NOVO: abas locais */
  .tabs { display:flex; gap:8px; }
  .tab { display:inline-flex; align-items:center; padding:8px 12px; border-radius:999px; font-size:12px; border:1px solid #cbd5e1; color:#334155; background:#fff; text-decoration:none; }
  .tab:hover { background:#f1f5f9; }
  .tab.active { background:var(--pri); color:#fff; border-color:transparent; }

  label { display:block; font-size: 12px; color: var(--muted); margin: 12px 0 6px; }
  input:not([type="checkbox"]):not([type="radio"]), select { width: 100%; padding: 10px 12px; border:1px solid #cbd5e1; border-radius: 10px; font: inherit; background:#fff; }
  .row { display:flex; gap: 12px; }
  .col { flex:1; min-width: 0; }

  .actions { display:flex; gap: 12px; align-items:center; justify-content: space-between; }
  .btn { background: var(--pri); color:#fff; border:1px solid transparent; border-radius: 10px; padding: 10px 16px; cursor:pointer; transition:.16s ease; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(2,6,23,.08); }
  .btn:focus-visible { outline: 2px solid #93c5fd; outline-offset: 2px; }
  .btn.secondary { background:#fff; color:#334155; border-color:#cbd5e1; }
  .btn.secondary:hover { background:#f8fafc; }
  .btn.small { padding: 8px 12px; font-size: 12px; }
  .note { font-size:12px; color:var(--muted); }
  .status { font-size:13px; color: var(--muted); }

  /* Full-bleed para a seção de eventos */
  .fullbleed {
    width: 100vw;
    position: relative;
    left: 50%;
    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
    border-radius: 0;
    border-left: 0;
    border-right: 0;
  }

  /* Tabela */
  .table-wrap { overflow:auto; border:1px solid #e2e8f0; border-radius:12px; }
  table { width:100%; border-collapse: collapse; background:#fff; table-layout: fixed; }
  th, td { padding:10px 12px; border-bottom:1px solid #eef2f7; vertical-align: top; text-align:left; }
  th { font-size:12px; color:#64748b; background:#f8fafc; position:sticky; top:0; z-index:1; }
  tr:hover td { background:#fbfdff; }
  .nowrap { white-space: nowrap; }
  .wrap-any { overflow-wrap:anywhere; word-break:break-word; white-space:normal; }

  .btn-row { display:flex; gap:8px; flex-wrap: wrap; }
  .btn.ghost { background:#fff; color:#334155; border-color:#cbd5e1; }
  .btn.ghost:hover { background:#f8fafc; }

  /* ===== Modal "Ver" ===== */
  .modal-backdrop{
    position: fixed; inset: 0;
    background: rgba(2,6,23,.55);
    display:none;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 9999;
  }
  .modal-backdrop.open{ display:flex; }
  .modal{
    width: min(980px, 96vw);
    max-height: min(88vh, 900px);
    overflow:auto;
    background:#fff;
    border-radius: 16px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 18px 60px rgba(2,6,23,.25);
  }
  .modal-h{
    position: sticky;
    top: 0;
    background: rgba(255,255,255,.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #e2e8f0;
    padding: 12px 14px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 10px;
  }
  .modal-title{ font-size: 14px; font-weight: 700; color:#0f172a; margin:0; }
  .modal-body{ padding: 14px; }
  .kv{
    display:grid;
    grid-template-columns: 180px 1fr;
    gap: 8px 12px;
    align-items:start;
    font-size: 13px;
  }
  .kv .k{ color:#475569; }
  .kv .v{ color:#0f172a; overflow-wrap:anywhere; }
  .section{
    margin-top: 12px;
    border-top: 1px solid #eef2f7;
    padding-top: 12px;
  }
  .section h3{
    font-size: 13px; margin: 0 0 8px;
    color:#0f172a;
  }
  .mono{
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 12px;
    background:#0b1220;
    color:#e5e7eb;
    border-radius: 12px;
    padding: 12px;
    overflow:auto;
    white-space: pre;
  }

  @media (max-width: 640px) {
    .actions { flex-direction: column; align-items: stretch; gap: 8px; }
    .tabs { flex-wrap: wrap; }
    .kv{ grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Painel de Controle — Auditoria</h1>
    <!-- NOVO: navegação para a aba de Férias -->
    <nav class="tabs" aria-label="Navegação do Controle">
      <a class="tab active" href="/api/automations/controle/ui">Auditoria</a>
      <a class="tab" href="/api/automations/controle/ferias/ui" title="Calendário de férias">Férias (Calendário)</a>
    </nav>
  </div>
  <span class="note">Somente leitura • Coordenadores/Admin</span>

  <!-- Filtros -->
  <div class="card" aria-labelledby="filtros-title">
    <h2 id="filtros-title" style="font-size:16px; margin:0 0 8px">Filtros</h2>
    <div class="row">
      <div class="col">
        <label for="kind">Tipo (alvo)</label>
        <select id="kind">
          <option value="" selected>(Todos)</option>
        </select>
      </div>
      <div class="col">
        <label for="username">Servidor (nome ou CPF)</label>
        <input id="username" placeholder="Ex.: Maria, 12345678901" />
      </div>
      <div class="col">
        <label for="action">Ação/Status</label>
        <!-- será populado dinamicamente -->
        <select id="action">
          <option value="">(Todas)</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="col">
        <label for="since">Desde</label>
        <input id="since" type="datetime-local" />
      </div>
      <div class="col">
        <label for="until">Até</label>
        <input id="until" type="datetime-local" />
      </div>
      <div class="col" style="max-width:180px">
        <label for="limit">Limite</label>
        <input id="limit" type="number" value="100" min="1" max="1000" />
      </div>
    </div>
    <div class="actions" style="margin-top:12px">
      <span class="status" id="status" role="status" aria-live="polite"></span>
      <div>
        <button id="btnCsv" class="btn secondary small" type="button">Exportar CSV</button>
        <button id="btnApply" class="btn" type="button">Aplicar filtros</button>
      </div>
    </div>
  </div>
</div>

<!-- Resultados (full-bleed) -->
<div class="card fullbleed" style="margin-top:16px" aria-labelledby="result-title">
  <div class="wrap" style="max-width: 1440px;">
    <h2 id="result-title" style="font-size:16px; margin:0 0 8px">Eventos</h2>
    <div class="table-wrap">
      <table id="tbl" aria-describedby="status">
        <colgroup>
          <col style="width:160px"><!-- QUANDO -->
          <col style="width:220px"><!-- SERVIDOR -->
          <col style="width:160px"><!-- PROTOCOLO -->
          <col style="width:140px"><!-- ALVO -->
          <col style="width:260px"><!-- NOME DO ARQUIVO -->
          <col style="width:120px"><!-- STATUS -->
          <col style="width:220px"><!-- AÇÕES -->
        </colgroup>
        <thead>
          <tr>
            <th class="nowrap">QUANDO</th>
            <th>SERVIDOR</th>
            <th>PROTOCOLO</th>
            <th>ALVO</th>
            <th>NOME DO ARQUIVO</th>
            <th class="nowrap">STATUS</th>
            <th class="nowrap">AÇÕES</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="note" style="margin-top:8px">Dica: quando houver link disponível, os botões “baixar” e “ver” aparecem em AÇÕES.</div>
  </div>
</div>

<!-- Modal de visualização -->
<div class="modal-backdrop" id="viewerBackdrop" role="dialog" aria-modal="true" aria-labelledby="viewerTitle">
  <div class="modal">
    <div class="modal-h">
      <h2 class="modal-title" id="viewerTitle">Detalhes</h2>
      <div style="display:flex; gap:8px; align-items:center;">
        <button id="viewerOpenRaw" class="btn ghost small" type="button" title="Abrir JSON bruto em nova aba">JSON</button>
        <button id="viewerClose" class="btn secondary small" type="button">Fechar</button>
      </div>
    </div>
    <div class="modal-body" id="viewerBody">
      <div class="note">Carregando…</div>
    </div>
  </div>
</div>

<script>
  const qs = (sel) => document.querySelector(sel);

  function fmtTs(s){
    if(!s) return "";
    const d = new Date(s);
    return isNaN(d) ? String(s) : d.toLocaleString();
  }
  function esc(s){ return (s ?? "").toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;', "'":'&#39;'}[m])); }
  function toISO(dtLocalStr){
    if(!dtLocalStr) return "";
    const d = new Date(dtLocalStr);
    return isNaN(d) ? "" : d.toISOString();
  }

  async function loadActions(){
    const sel = qs("#action");
    const keep = sel.value;
    const kind = qs("#kind").value.trim();
    try{
      const url = kind ? `/api/automations/controle/actions?kind=${encodeURIComponent(kind)}` : `/api/automations/controle/actions`;
      const r = await fetch(url, { credentials: "include" });
      if(!r.ok) throw new Error();
      const data = await r.json();
      const items = Array.isArray(data.items) ? data.items : [];
      sel.innerHTML = "";
      const optAll = document.createElement("option");
      optAll.value = ""; optAll.textContent = "(Todas)";
      sel.appendChild(optAll);
      for(const a of items){
        const o = document.createElement("option");
        o.value = a; o.textContent = a;
        sel.appendChild(o);
      }
      if(!keep){
        if(items.includes("completed")) sel.value = "completed";
      }else{
        sel.value = keep;
      }
    }catch(_){
      const defaults = ["submitted","running","completed","failed","download"];
      sel.innerHTML = "";
      const optAll = document.createElement("option");
      optAll.value = ""; optAll.textContent = "(Todas)";
      sel.appendChild(optAll);
      defaults.forEach(a=>{
        const o = document.createElement("option");
        o.value = a; o.textContent = a;
        sel.appendChild(o);
      });
      sel.value = "completed";
    }
  }

  async function loadKinds(){
    const sel = qs("#kind");
    const keep = sel.value;
    try{
      const r = await fetch(`/api/automations/controle/kinds`, { credentials: "include" });
      if(!r.ok) throw new Error();
      const data = await r.json();
      const items = Array.isArray(data.items) ? data.items : [];
      // preserva a primeira opção "(Todos)"
      sel.innerHTML = "";
      const optAll = document.createElement("option");
      optAll.value = ""; optAll.textContent = "(Todos)";
      sel.appendChild(optAll);
      for(const k of items){
        const o = document.createElement("option");
        o.value = k; o.textContent = k.toUpperCase(); // exibe legível, mantém value normalizado
        sel.appendChild(o);
      }
      if(keep){
        sel.value = keep;
      }
    }catch(_){
      // fallback mínimo caso endpoint falhe
      if(!sel.querySelector("option[value='dfd']")){
        const o1=document.createElement("option"); o1.value="dfd"; o1.textContent="DFD"; sel.appendChild(o1);
      }
      if(!sel.querySelector("option[value='ferias']")){
        const o2=document.createElement("option"); o2.value="ferias"; o2.textContent="FÉRIAS"; sel.appendChild(o2);
      }
    }
  }

  function renderRow(it){
    const tr = document.createElement("tr");

    const quando = fmtTs(it.ts || it.created_at || it.updated_at);
    const servidor = it.username || "";
    const protocolo = it.protocolo || ((it.extra && (it.extra.protocolo || it.extra.processo || it.extra.process_number)) || "");
    const alvo = it.alvo || it.target_kind || ((it.extra && it.extra.kind) || "");
    const filename = it.filename || ((it.extra && it.extra.filename) || "");
    const status = it.status || it.action || "";

    const tdQuando = `<td class="nowrap">${esc(quando)}</td>`;
    const tdServidor = `<td class="wrap-any">${esc(servidor)}</td>`;
    const tdProtocolo = `<td class="wrap-any">${esc(protocolo || "—")}</td>`;
    const tdAlvo = `<td class="wrap-any">${esc(alvo || "—")}</td>`;
    const tdFile = `<td class="wrap-any">${esc(filename || "—")}</td>`;
    const tdStatus = `<td class="nowrap">${esc(status || "—")}</td>`;

    const actions = [];
    if (it.download_url){
      const b = document.createElement("button");
      b.type="button"; b.className="btn small";
      b.textContent="baixar";
      b.addEventListener("click", ()=> doDownload(it.download_url, it.filename || "arquivo"));
      actions.push(b);
    }
    if (it.submission_url){
      const v = document.createElement("button");
      v.type="button";
      v.className="btn small secondary";
      v.textContent="ver";
      v.addEventListener("click", ()=> openViewer(it.submission_url));
      actions.push(v);
    }
    const tdAcoes = document.createElement("td");
    tdAcoes.className = "nowrap";
    if (actions.length){
      const wrap = document.createElement("div");
      wrap.className = "btn-row";
      actions.forEach(el => wrap.appendChild(el));
      tdAcoes.appendChild(wrap);
    } else {
      tdAcoes.innerHTML = `<span class="note">—</span>`;
    }

    tr.innerHTML = tdQuando + tdServidor + tdProtocolo + tdAlvo + tdFile + tdStatus;
    tr.appendChild(tdAcoes);
    return tr;
  }

  // ===== Viewer (modal) =====
  const viewerBackdrop = qs("#viewerBackdrop");
  const viewerBody = qs("#viewerBody");
  const viewerTitle = qs("#viewerTitle");
  const viewerClose = qs("#viewerClose");
  const viewerOpenRaw = qs("#viewerOpenRaw");
  let lastRawUrl = null;

  function closeViewer(){
    viewerBackdrop.classList.remove("open");
    viewerBody.innerHTML = `<div class="note">—</div>`;
    lastRawUrl = null;
  }
  viewerClose.addEventListener("click", closeViewer);
  viewerBackdrop.addEventListener("click", (e)=>{ if(e.target === viewerBackdrop) closeViewer(); });
  window.addEventListener("keydown", (e)=>{ if(e.key === "Escape") closeViewer(); });

  function safeObj(x){
    if (x && typeof x === "object") return x;
    if (typeof x === "string"){
      try { return JSON.parse(x); } catch { return null; }
    }
    return null;
  }

  function pickProtocolo(obj){
    const px = safeObj(obj?.payload) || obj?.payload || {};
    const rs = safeObj(obj?.result)  || obj?.result  || {};
    return (rs?.protocolo || px?.protocolo || px?.processo || px?.process_number || "");
  }

  function fmtDateTime(v){
    if (!v) return "—";
    const d = new Date(v);
    return isNaN(d) ? String(v) : d.toLocaleString();
  }

  function renderKeyValue(title, rows){
    const html = rows
      .filter(r => r && r.length >= 2)
      .map(([k,v]) => `<div class="k">${esc(k)}</div><div class="v">${esc(v ?? "—")}</div>`)
      .join("");
    return `
      <div class="section">
        <h3>${esc(title)}</h3>
        <div class="kv">${html || `<div class="note">—</div>`}</div>
      </div>
    `;
  }

  function renderPeriods(obj){
    const px = safeObj(obj?.payload) || obj?.payload || {};
    const rs = safeObj(obj?.result)  || obj?.result  || {};
    const per = px?.periodos || rs?.periodos;
    if (!Array.isArray(per) || !per.length) return "";
    const lines = per
      .map((p, i) => {
        const ini = p?.inicio || p?.data_inicio || "";
        const fim = p?.fim || p?.data_fim || "";
        if (!ini || !fim) return null;
        return `${i+1}. ${ini} → ${fim}`;
      })
      .filter(Boolean);
    if (!lines.length) return "";
    return `
      <div class="section">
        <h3>Períodos</h3>
        <div class="mono">${esc(lines.join("\n"))}</div>
      </div>
    `;
  }

  function renderSoftDelete(obj){
    const rs = safeObj(obj?.result) || obj?.result || {};
    const meta = rs?._soft_delete;
    if (!meta || !meta.deleted) return "";
    const by = meta.deleted_by || {};
    return renderKeyValue("Cancelamento (soft delete)", [
      ["Cancelado em", meta.deleted_at || "—"],
      ["Motivo", meta.reason || "—"],
      ["Origem", meta.origin || "—"],
      ["Por", [by.nome, by.email, by.cpf].filter(Boolean).join(" • ") || "—"],
    ]);
  }

  async function openViewer(url){
    viewerBackdrop.classList.add("open");
    viewerBody.innerHTML = `<div class="note">Carregando…</div>`;
    viewerTitle.textContent = "Detalhes";
    lastRawUrl = url;

    viewerOpenRaw.onclick = ()=>{
      if (lastRawUrl) window.open(lastRawUrl, "_blank", "noopener");
    };

    try{
      const r = await fetch(url, { credentials: "include" });
      if(!r.ok){
        const t = await r.text().catch(()=> "");
        viewerBody.innerHTML = `<div class="err">Erro ${r.status}: ${esc(t || "falha ao carregar")}</div>`;
        return;
      }
      const obj = await r.json();

      const kind = (obj?.kind || (obj?.payload && obj.payload.kind) || "").toString();
      const sid = (obj?.id || "").toString();
      const st  = (obj?.status || "").toString();
      const proto = pickProtocolo(obj);

      viewerTitle.textContent = `${kind ? kind.toUpperCase() : "SUBMISSÃO"} • ${sid ? sid.slice(0,8) : ""}`;

      const summary = renderKeyValue("Resumo", [
        ["ID", sid || "—"],
        ["Kind", kind || "—"],
        ["Status", st || "—"],
        ["Protocolo", proto || "—"],
        ["Criado em", fmtDateTime(obj?.created_at)],
        ["Atualizado em", fmtDateTime(obj?.updated_at)],
        ["Servidor", [obj?.actor_nome, obj?.actor_email, obj?.actor_cpf].filter(Boolean).join(" • ") || "—"],
        ["Erro", obj?.error || "—"],
      ]);

      const feriasExtra = (kind === "ferias")
        ? renderKeyValue("Detalhes de Férias", [
            ["Tipo", (safeObj(obj?.payload)?.tipo) || obj?.payload?.tipo || "—"],
            ["Exercício", (safeObj(obj?.payload)?.exercicio) || obj?.payload?.exercicio || "—"],
            ["Dias (total)", (safeObj(obj?.result)?.dias_total) || obj?.result?.dias_total || "—"],
          ])
        : "";

      const soft = renderSoftDelete(obj);
      const periods = renderPeriods(obj);

      const rawPretty = `
        <div class="section">
          <h3>JSON (formatado)</h3>
          <div class="mono">${esc(JSON.stringify(obj, null, 2))}</div>
        </div>
      `;

      viewerBody.innerHTML = summary + feriasExtra + soft + periods + rawPretty;
    }catch(e){
      console.error(e);
      viewerBody.innerHTML = `<div class="err">Falha ao carregar detalhes.</div>`;
    }
  }

  async function doDownload(url, suggestedName){
    try{
      const r = await fetch(url, { method: 'POST', credentials: 'include' });
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const blob = await r.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      const name = suggestedName && /\.[a-z0-9]{2,5}$/i.test(suggestedName) ? suggestedName : `arquivo_${Date.now()}`;
      a.download = name;
      a.click();
      URL.revokeObjectURL(a.href);
    }catch(e){
      alert('Não foi possível baixar o arquivo.');
    }
  }

  async function load(){
    const params = new URLSearchParams();
    const limit = Number(qs("#limit").value || 100);
    const kind = qs("#kind").value.trim();
    const username = qs("#username").value.trim();
    const action = qs("#action").value.trim();
    const since = qs("#since").value;
    const until = qs("#until").value;

    if (limit) params.set("limit", String(limit));
    if (kind) params.set("kind", kind);
    if (username) params.set("username", username);
    if (action) params.set("action", action);
    if (since) params.set("since", toISO(since));
    if (until) params.set("until", toISO(until));

    qs("#status").textContent = "Carregando...";

    try{
      const url = `/api/automations/controle/audits?` + params.toString();
      const resp = await fetch(url, { credentials: "include" });
      if(!resp.ok){
        const t = await resp.text();
        qs("#status").textContent = `Erro ${resp.status}: ${t}`;
        return;
      }
      const data = await resp.json();
      renderRows(data.items || []);
      qs("#status").textContent = `${data.count ?? (data.items?.length || 0)} evento(s) encontrado(s)`;
    }catch(e){
      qs("#status").textContent = "Erro de rede ao carregar.";
    }
  }

  function renderRows(rows){
    const tbody = document.querySelector("#tbl tbody");
    tbody.innerHTML = "";
    if(!rows || !rows.length){
      const tr = document.createElement("tr");
      tr.innerHTML = `<td colspan="7" class="note">Nenhum registro.</td>`;
      tbody.appendChild(tr);
      return;
    }
    rows.forEach(r => tbody.appendChild(renderRow(r)));
  }

  function exportCsv(){
    const params = new URLSearchParams();
    const limit = Number(qs("#limit").value || 1000);
    const kind = qs("#kind").value.trim();
    const username = qs("#username").value.trim();
    const action = qs("#action").value.trim();
    const since = qs("#since").value;
    const until = qs("#until").value;

    if (limit) params.set("limit", String(limit));
    if (kind) params.set("kind", kind);
    if (username) params.set("username", username);
    if (action) params.set("action", action);
    if (since) params.set("since", toISO(since));
    if (until) params.set("until", toISO(until));

    const url = `/api/automations/controle/audits.csv?` + params.toString();
    window.open(url, "_blank");
  }

  function initDefaults(){
    // Define padrões locais:
    // - since: 7 dias atrás às 00:00 (local)
    // - until: hoje às 23:59 (local)
    const pad = (n)=>String(n).padStart(2,"0");
    const today = new Date();
    const startOfToday = new Date(
      today.getFullYear(),
      today.getMonth(),
      today.getDate(),
      0, 0, 0, 0
    );
    const sevenDaysAgoStart = new Date(startOfToday);
    sevenDaysAgoStart.setDate(sevenDaysAgoStart.getDate() - 7);
    const endOfToday = new Date(
      today.getFullYear(),
      today.getMonth(),
      today.getDate(),
      23, 59, 0, 0
    );
    qs("#since").value = `${sevenDaysAgoStart.getFullYear()}-${pad(sevenDaysAgoStart.getMonth()+1)}-${pad(sevenDaysAgoStart.getDate())}T00:00`;
    qs("#until").value = `${endOfToday.getFullYear()}-${pad(endOfToday.getMonth()+1)}-${pad(endOfToday.getDate())}T${pad(endOfToday.getHours())}:${pad(endOfToday.getMinutes())}`;

    qs("#username").focus();
  }

  qs("#btnApply").addEventListener("click", load);
  qs("#btnCsv").addEventListener("click", exportCsv);
  qs("#kind").addEventListener("change", async ()=>{
    await loadActions();
  });

  async function bootstrap(){
    await loadKinds();
    await loadActions();
    initDefaults();
    await load();
  }
  bootstrap();
</script>
</body>
</html>
